const FIELD_MAPPINGS = {
    // JavaScript字段名 -> 数据库字段名

};

// 通用映射函数：JavaScript对象 -> 数据库对象
function mapToDB(data) {
    const result = {};
    for (const [key, value] of Object.entries(data)) {
        const dbKey = FIELD_MAPPINGS[key] || key;
        result[dbKey] = value;
    }
    return result;
}

// 通用映射函数：数据库对象 -> JavaScript对象
function mapFromDB(data) {
    const result = {};
    for (const [key, value] of Object.entries(data)) {
        const jsKey = FIELD_MAPPINGS[key] || key;
        result[jsKey] = value;
    }
    return result;
}

// 批量映射函数
function batchMapFromDB(dataArray) {
    return dataArray.map(item => mapFromDB(item));
}

function batchMapToDB(dataArray) {
    return dataArray.map(item => mapToDB(item));
}

// 从Supabase加载数据（增加本地缓存兜底）
async function loadDataFromStorage() {
    console.log('正在初始化Supabase连接...');
    
    try {
        // 测试Supabase连接
        const { data, error } = await supabase
            .from('fb_ad_accounts')
            .select('count');
        
        if (error) {
            console.error('Supabase连接失败，将使用本地缓存数据:', error);
            // 从localStorage读取兜底数据
            const localAccounts = localStorage.getItem('fb_ad_accounts');
            if (localAccounts) {
                accounts = JSON.parse(localAccounts);
                console.log('从本地缓存加载账号数据成功');
            }
            // 其他数据同理（可选，这里优先保障账号显示）
            return;
        } else {
            console.log('Supabase连接成功');
        }
        
      const { data: accountsData, error: accountsError } = await supabase
            .from('fb_ad_accounts')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (!accountsError && accountsData) {
            accounts = accountsData;
            localStorage.setItem('fb_ad_accounts', JSON.stringify(accounts));
        } else if (accountsError) {
            console.error('加载账号数据错误，使用本地缓存:', accountsError);
            const localAccounts = localStorage.getItem('fb_ad_accounts');
            if (localAccounts) accounts = JSON.parse(localAccounts);
        }
        
        // 加载广告系列（修复：更新本地数组+字段映射）
        const { data: campaignsData, error: campaignsError } = await supabase
            .from('fb_ad_campaigns')
            .select('*');
        
        if (!campaignsError && campaignsData) {
            campaigns = batchMapFromDB(campaignsData); // 字段映射
            localStorage.setItem('fb_ad_campaigns', JSON.stringify(campaignsData)); // 缓存原始数据
        } else {
            const localCampaigns = localStorage.getItem('fb_ad_campaigns');
            if (localCampaigns) campaigns = batchMapFromDB(JSON.parse(localCampaigns));
        }
        
        // 加载广告组（修复：更新本地数组+字段映射）
        const { data: adSetsData, error: adSetsError } = await supabase
            .from('fb_ad_ad_sets')
            .select('*');
        
        if (!adSetsError && adSetsData) {
            adSets = batchMapFromDB(adSetsData); // 字段映射
            localStorage.setItem('fb_ad_ad_sets', JSON.stringify(adSetsData));
        } else {
            const localAdSets = localStorage.getItem('fb_ad_ad_sets');
            if (localAdSets) adSets = batchMapFromDB(JSON.parse(localAdSets));
        }
        
        // 加载广告（修复：更新本地数组+字段映射）
        const { data: adsData, error: adsError } = await supabase
            .from('fb_ad_ads')
            .select('*');
        
        if (!adsError && adsData) {
            ads = batchMapFromDB(adsData); // 字段映射
            localStorage.setItem('fb_ad_ads', JSON.stringify(adsData));
        } else {
            const localAds = localStorage.getItem('fb_ad_ads');
            if (localAds) ads = batchMapFromDB(JSON.parse(localAds));
        }
        
        // 加载广告详情数据
        const { data: adDataResult, error: adDataError } = await supabase
            .from('fb_ad_data')
            .select('*');
        
        if (!adDataError && adDataResult) {
            adData = batchMapFromDB(adDataResult);
            localStorage.setItem('fb_ad_data', JSON.stringify(adDataResult));
        } else {
            const localAdData = localStorage.getItem('fb_ad_data');
            if (localAdData) adData = batchMapFromDB(JSON.parse(localAdData));
        }
        
        // 加载网站数据
        const { data: websiteDataResult, error: websiteDataError } = await supabase
            .from('fb_ad_website_data')
            .select('*');
        
        if (!websiteDataError && websiteDataResult) {
            websiteData = batchMapFromDB(websiteDataResult);
            localStorage.setItem('fb_ad_website_data', JSON.stringify(websiteDataResult));
        } else {
            const localWebsiteData = localStorage.getItem('fb_ad_website_data');
            if (localWebsiteData) websiteData = batchMapFromDB(JSON.parse(localWebsiteData));
        }
        
    } catch (error) {
        console.error('加载数据失败，使用本地缓存:', error);
        // 最终兜底
        const localAccounts = localStorage.getItem('fb_ad_accounts');
        const localCampaigns = localStorage.getItem('fb_ad_campaigns');
        const localAdSets = localStorage.getItem('fb_ad_ad_sets');
        const localAds = localStorage.getItem('fb_ad_ads');
        
        if (localAccounts) accounts = JSON.parse(localAccounts);
        if (localCampaigns) campaigns = batchMapFromDB(JSON.parse(localCampaigns));
        if (localAdSets) adSets = batchMapFromDB(JSON.parse(localAdSets));
        if (localAds) ads = batchMapFromDB(JSON.parse(localAds));
    }
}
// 保存账号数据到Supabase
// 保存账号数据到Supabase（同步更新本地缓存）
async function saveAccountsToStorage() {
    try {
        for (const account of accounts) {
            const { error } = await supabase
                .from('fb_ad_accounts')
                .upsert(account);
            
            if (error) {
                console.error('保存账号失败:', error);
            }
        }
        // 同步更新本地缓存（关键：保证缓存数据最新）
        localStorage.setItem('fb_ad_accounts', JSON.stringify(accounts));
        console.log('账号数据已同步到本地缓存');
    } catch (error) {
        console.error('保存账号数据失败，仅更新本地缓存:', error);
        localStorage.setItem('fb_ad_accounts', JSON.stringify(accounts));
    }
}
// 保存广告数据到Supabase
async function saveAdDataToStorage() {
    console.log('开始保存广告数据到数据库...');
    
    try {
        // 保存广告系列
        for (const campaign of campaigns) {
            const dbCampaign = mapToDB(campaign);
            const { error } = await supabase
                .from('fb_ad_campaigns')
                .upsert(dbCampaign);
            
            if (error) {
                console.error('保存广告系列失败:', error);
            }
        }
        
        // 保存广告组
        for (const adSet of adSets) {
            const dbAdSet = mapToDB(adSet);
            const { error } = await supabase
                .from('fb_ad_ad_sets')
                .upsert(dbAdSet);
            
            if (error) {
                console.error('保存广告组失败:', error);
            }
        }
        
        // 保存广告
        for (const ad of ads) {
            const dbAd = mapToDB(ad);
            const { error } = await supabase
                .from('fb_ad_ads')
                .upsert(dbAd);
            
            if (error) {
                console.error('保存广告失败:', error);
            }
        }
        
        // 保存广告详情数据
        for (const data of adData) {
            const dbData = mapToDB(data);
            const { error } = await supabase
                .from('fb_ad_data')
                .upsert(dbData);
            
            if (error) {
                console.error('保存广告详情数据失败:', error);
            }
        }
        
        // 保存网站数据
        for (const webData of websiteData) {
            const dbWebData = mapToDB(webData);
            const { error } = await supabase
                .from('fb_ad_website_data')
                .upsert(dbWebData);
            
            if (error) {
                console.error('保存网站数据失败:', error);
            }
        }
        
        console.log('广告数据保存完成');
    } catch (error) {
        console.error('保存广告数据失败:', error);
    }
}

// 添加新账号
async function addNewAccount() {
    console.log('添加账号按钮被点击');
    try {
        const newAccount = {
            id: 'acc_' + Date.now(),
            name: '新增账号',
            status: 'active',
            remark: '',
            created_at: new Date().toISOString()
        };
        
        console.log('新账号对象:', newAccount);
        
        // 保存到本地数组
        accounts.push(newAccount);
        
        // 保存到Supabase
        const { error } = await supabase
            .from('fb_ad_accounts')
            .insert([newAccount]);
        
        if (error) {
            console.error('添加账号失败:', error);
            alert('添加账号失败，请检查控制台');
            // 如果保存到数据库失败，从本地数组中移除
            const index = accounts.findIndex(acc => acc.id === newAccount.id);
            if (index > -1) {
                accounts.splice(index, 1);
            }
            return;
        }
        
        console.log('账号添加成功，重新渲染页面');
        // 重新渲染账号页面
        renderAccountsPage();
        
    } catch (error) {
        console.error('添加账号异常:', error);
        alert('添加账号时发生异常: ' + error.message);
    }
}

// 渲染账号页面
function renderAccountsPage() {
    const accountsGrid = document.getElementById('accountsGrid');
    accountsGrid.innerHTML = '';
    
    // 排序：active -> paused -> deleted
    const sortedAccounts = [...accounts].sort((a, b) => {
        const statusOrder = { active: 1, paused: 2, deleted: 3 };
        return statusOrder[a.status] - statusOrder[b.status];
    });
    
    sortedAccounts.forEach(account => {
        const accountCard = document.createElement('div');
        accountCard.className = 'account-card';
        accountCard.dataset.accountId = account.id;
        
        let statusClass = '';
        let statusText = '';
        
        switch(account.status) {
            case 'active':
                statusClass = 'status-active';
                statusText = '投放中';
                break;
            case 'paused':
                statusClass = 'status-paused';
                statusText = '暂停投放';
                break;
            case 'deleted':
                statusClass = 'status-deleted';
                statusText = '已删除';
                break;
        }
        
        accountCard.innerHTML = `
            <div class="account-status">
                <div class="status-dot ${statusClass}"></div>
                <span>${statusText}</span>
            </div>
            <div class="account-name" contenteditable="true" onblur="updateAccountName('${account.id}', this.textContent)">${account.name}</div>
            <div class="account-remark" contenteditable="true" onblur="updateAccountRemark('${account.id}', this.textContent)">${account.remark || '点击添加备注'}</div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-outline" style="font-size: 12px; padding: 5px 10px;" onclick="changeAccountStatus('${account.id}', 'active')">投放中</button>
                <button class="btn btn-outline" style="font-size: 12px; padding: 5px 10px;" onclick="changeAccountStatus('${account.id}', 'paused')">暂停</button>
                <button class="btn btn-outline" style="font-size: 12px; padding: 5px 10px;" onclick="changeAccountStatus('${account.id}', 'deleted')">删除</button>
            </div>
        `;
        
        accountCard.addEventListener('click', (e) => {
            if (!e.target.closest('button') && !e.target.closest('[contenteditable="true"]')) {
                showStatsPage(account.id);
            }
        });
        
        accountsGrid.appendChild(accountCard);
    });
    
    // 更新汇总统计
    updateAccountsSummary();
}

// 更新账号名称
async function updateAccountName(accountId, newName) {
    const account = accounts.find(a => a.id === accountId);
    if (account) {
        account.name = newName || '未命名账号';
        await saveAccountsToStorage();
        updateAccountsSummary();
    }
}

// 更新账号备注
async function updateAccountRemark(accountId, newRemark) {
    const account = accounts.find(a => a.id === accountId);
    if (account) {
        account.remark = newRemark;
        await saveAccountsToStorage();
    }
}

// 更改账号状态
async function changeAccountStatus(accountId, newStatus) {
    const account = accounts.find(a => a.id === accountId);
    if (account) {
        account.status = newStatus;
        await saveAccountsToStorage();
        renderAccountsPage();
    }
}

// 更新账号汇总统计
function updateAccountsSummary() {
    const totalAccounts = accounts.length;
    const activeAccounts = accounts.filter(a => a.status === 'active').length;
    const pausedAccounts = accounts.filter(a => a.status === 'paused').length;
    const deletedAccounts = accounts.filter(a => a.status === 'deleted').length;
    
    document.getElementById('totalAccounts').textContent = totalAccounts;
    document.getElementById('activeAccounts').textContent = activeAccounts;
    document.getElementById('pausedAccounts').textContent = pausedAccounts;
    document.getElementById('deletedAccounts').textContent = deletedAccounts;
}

// 显示账号页面
function showAccountsPage() {
    document.getElementById('accountsPage').classList.remove('hidden');
    document.getElementById('statsPage').classList.add('hidden');
    renderAccountsPage();
}

// 显示统计数据页面
function showStatsPage(accountId) {
    currentAccountId = accountId;
    
    // 更新页面标题
    const account = accounts.find(a => a.id === accountId);
    document.getElementById('selectedAccountName').textContent = account ? account.name : '未知账号';
    
    // 渲染广告架构
    renderCampaignTree();
    
    // 更新汇总统计
    updateCampaignsSummary();
    
    // 显示页面
    document.getElementById('accountsPage').classList.add('hidden');
    document.getElementById('statsPage').classList.remove('hidden');
}

// 渲染广告架构树
function renderCampaignTree() {
    const campaignTree = document.getElementById('campaignTree');
    campaignTree.innerHTML = '';
    
    // 获取当前账号的广告系列
    const accountCampaigns = campaigns.filter(c => c.accountId === currentAccountId);
    
    // 排序：active -> paused -> deleted
    const sortedCampaigns = [...accountCampaigns].sort((a, b) => {
        const statusOrder = { active: 1, paused: 2, deleted: 3 };
        return statusOrder[a.status] - statusOrder[b.status];
    });
    
    if (sortedCampaigns.length === 0) {
        campaignTree.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无广告系列，点击"添加系列"按钮创建</div>';
        return;
    }
    
    sortedCampaigns.forEach(campaign => {
        // 获取该系列下的广告组
        const campaignAdSets = adSets.filter(adset => adset.campaignId === campaign.id);
        
        const campaignNode = createTreeNode(campaign, 'campaign', campaignAdSets);
        campaignTree.appendChild(campaignNode);
    });
}

// 创建树节点（纯 DOM 构建，保留事件绑定）
function createTreeNode(item, type, children = []) {
    const node = document.createElement('div');
    node.className = 'tree-node';
    node.dataset.id = item.id;
    node.dataset.type = type;

    let statusClass = '';
    switch (item.status) {
        case 'active': statusClass = 'status-active'; break;
        case 'paused': statusClass = 'status-paused'; break;
        case 'deleted': statusClass = 'status-deleted'; break;
    }

    // 确定子项
    let childItems = [];
    if (type === 'campaign') {
        childItems = children;
    } else if (type === 'adset') {
        childItems = ads.filter(ad => ad.adSetId === item.id);
    }

    const hasChildren = childItems.length > 0;
    const isCollapsed = item.collapsed || false;

    // 创建 node-header
    const headerDiv = document.createElement('div');
    headerDiv.className = 'node-header';

    // toggle 按钮
    const toggleBtn = document.createElement('div');
    toggleBtn.className = 'toggle-btn';
    toggleBtn.onclick = (e) => {
        e.stopPropagation();
        toggleTreeNode(item.id, type);
    };
    toggleBtn.textContent = hasChildren ? (isCollapsed ? '▶' : '▼') : '';
    headerDiv.appendChild(toggleBtn);

    // 状态指示器
    const statusDiv = document.createElement('div');
    statusDiv.className = `status-indicator ${statusClass}`;
    headerDiv.appendChild(statusDiv);

    // 节点名称（可编辑）
    const nameDiv = document.createElement('div');
    nameDiv.className = 'node-name';
    nameDiv.dataset.id = item.id;
    nameDiv.dataset.type = type;
    nameDiv.textContent = item.name;
    nameDiv.ondblclick = (e) => {
        e.stopPropagation();
        startEditNodeName(nameDiv);
    };
    headerDiv.appendChild(nameDiv);

    // 操作按钮
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'node-actions';
    const addBtn = document.createElement('button');
    addBtn.className = 'node-action-btn';
    addBtn.textContent = '+';
    addBtn.title = `添加${type === 'campaign' ? '广告组' : '广告'}`;
    addBtn.onclick = (e) => {
        e.stopPropagation();
        addChildNode(item.id, type);
    };
    actionsDiv.appendChild(addBtn);

    const activeBtn = document.createElement('button');
    activeBtn.className = 'node-action-btn';
    activeBtn.textContent = '●';
    activeBtn.title = '设为投放中';
    activeBtn.onclick = (e) => {
        e.stopPropagation();
        changeNodeStatus(item.id, type, 'active');
    };
    actionsDiv.appendChild(activeBtn);

    const pauseBtn = document.createElement('button');
    pauseBtn.className = 'node-action-btn';
    pauseBtn.textContent = '❚❚';
    pauseBtn.title = '暂停';
    pauseBtn.onclick = (e) => {
        e.stopPropagation();
        changeNodeStatus(item.id, type, 'paused');
    };
    actionsDiv.appendChild(pauseBtn);

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'node-action-btn';
    deleteBtn.textContent = '×';
    deleteBtn.title = '删除';
    deleteBtn.onclick = (e) => {
        e.stopPropagation();
        changeNodeStatus(item.id, type, 'deleted');
    };
    actionsDiv.appendChild(deleteBtn);

    headerDiv.appendChild(actionsDiv);

    // 节点头部点击事件（显示数据）
    headerDiv.addEventListener('click', (e) => {
        if (!e.target.closest('.node-actions') &&
            !e.target.closest('.toggle-btn') &&
            !e.target.closest('.node-name.editable')) {
            showDataForNode(item.id, type);
        }
    });

    node.appendChild(headerDiv);

    // 子节点容器
    const childrenContainer = document.createElement('div');
    childrenContainer.className = `children-container ${isCollapsed ? 'collapsed' : ''}`;

    if (hasChildren) {
        childItems.forEach(child => {
            let childNode;
            if (type === 'campaign') {
                const childAds = ads.filter(ad => ad.adSetId === child.id);
                childNode = createTreeNode(child, 'adset', childAds);
            } else if (type === 'adset') {
                childNode = createTreeNode(child, 'ad');
            } else {
                // 广告节点无子节点
                childNode = createTreeNode(child, 'ad');
            }
            childrenContainer.appendChild(childNode);
        });
    }

    node.appendChild(childrenContainer);

    return node;
}
// 切换树节点展开/折叠
function toggleTreeNode(id, type) {
    let item;
    if (type === 'campaign') {
        item = campaigns.find(c => c.id === id);
    } else if (type === 'adset') {
        item = adSets.find(a => a.id === id);
    } else {
        return;
    }
    
    if (item) {
        item.collapsed = !item.collapsed;
        saveAdDataToStorage();
        renderCampaignTree();
    }
}

// 更新节点名称
async function updateNodeName(id, type, newName) {
    let item;
    if (type === 'campaign') {
        item = campaigns.find(c => c.id === id);
    } else if (type === 'adset') {
        item = adSets.find(a => a.id === id);
    } else if (type === 'ad') {
        item = ads.find(a => a.id === id);
    }
    
    if (item) {
        item.name = newName || (type === 'campaign' ? '未命名系列' : type === 'adset' ? '未命名广告组' : '未命名广告');
        await saveAdDataToStorage();
        updateCampaignsSummary();
    }
}

// 双击开启节点名称编辑
function startEditNodeName(element) {
    // 1. 阻止事件冒泡，避免触发节点选中、折叠等其他事件
    event.stopPropagation();
    
    // 2. 开启可编辑状态，添加样式反馈
    element.contentEditable = true;
    element.classList.add('editable');
    
    // 3. 聚焦元素，选中现有文本（提升用户体验）
    element.focus();
    const selection = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(element);
    selection.removeAllRanges();
    selection.addRange(range);
    
    // 4. 绑定编辑完成事件（失去焦点/按Enter键）
    element.addEventListener('blur', () => finishEditNodeName(element));
    element.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // 阻止回车换行
            finishEditNodeName(element);
        }
    });
}

// 完成节点名称编辑，保存结果
function finishEditNodeName(element) {
    // 1. 获取节点信息和新名称
    const nodeId = element.dataset.id;
    const nodeType = element.dataset.type;
    const newName = element.textContent.trim() || (
        nodeType === 'campaign' ? '未命名系列' : 
        nodeType === 'adset' ? '未命名广告组' : '未命名广告'
    );
    
    // 2. 关闭可编辑状态，移除样式反馈
    element.contentEditable = false;
    element.classList.remove('editable');
    
    // 3. 调用原有函数更新名称并保存
    updateNodeName(nodeId, nodeType, newName);
    
    // 4. 移除事件监听（避免重复绑定）
    element.removeEventListener('blur', () => finishEditNodeName(element));
}

// 更改节点状态
async function changeNodeStatus(id, type, newStatus) {
    let item;
    let childItems = [];
    
    if (type === 'campaign') {
        item = campaigns.find(c => c.id === id);
        // 获取该系列下的所有广告组和广告
        childItems = [
            ...adSets.filter(adset => adset.campaignId === id),
            ...ads.filter(ad => {
                const adset = adSets.find(as => as.id === ad.adSetId);
                return adset && adset.campaignId === id;
            })
        ];
    } else if (type === 'adset') {
        item = adSets.find(a => a.id === id);
        // 获取该广告组下的所有广告
        childItems = ads.filter(ad => ad.adSetId === id);
    } else if (type === 'ad') {
        item = ads.find(a => a.id === id);
    }
    
    if (item) {
        item.status = newStatus;
        
        // 更新子项状态（如果父项状态改变）
        childItems.forEach(child => {
            child.status = newStatus;
        });
        
        await saveAdDataToStorage();
        renderCampaignTree();
        updateCampaignsSummary();
        
        // 如果当前正在显示该节点的数据，刷新B区
        const activeNode = document.querySelector('.node-header.active');
        if (activeNode && activeNode.closest('.tree-node').dataset.id === id) {
            showDataForNode(id, type);
        }
    }
}

// 添加子节点
async function addChildNode(parentId, parentType) {
    if (parentType === 'campaign') {
        // 添加广告组
        const newAdSet = {
            id: 'adset_' + Date.now(),
            campaignId: parentId,
            name: '新广告组',
            status: 'active',
            createdAt: new Date().toISOString()
        };
        
                const dbNewAdSet = mapToDB(newAdSet);
        // 3. 插入数据库（使用转换后的字段名）

// 2. 修复aggregateAdData函数（补充必要字段）
function aggregateAdData(adDataArray) {
    const result = {
        budget: 0,
        spent: 0,
        clicks: 0,
        impressions: 0,
        cpm: 0,
        cpc: 0,
        ctr: 0,
        addsToCart: 0,
        checkoutsInitiated: 0,
        addsPaymentInfo: 0,
        purchases: 0,
        purchaseRoas: 0
    };
    
    adDataArray.forEach(data => {
        result.budget += data.budget || 0;
        result.spent += data.spent || 0;
        result.clicks += data.clicks || 0;
        result.impressions += data.impressions || 0;
        result.addsToCart += data.adds_to_cart || data.addsToCart || 0;
        result.checkoutsInitiated += data.checkouts_initiated || data.checkoutsInitiated || 0;
        result.addsPaymentInfo += data.adds_payment_info || data.addsPaymentInfo || 0;
        result.purchases += data.purchases || 0;
    });
    
    // 计算平均值（修复除以0的情况）
    result.cpm = result.impressions > 0 ? (result.spent / result.impressions) * 1000 : 0;
    result.cpc = result.clicks > 0 ? result.spent / result.clicks : 0;
    result.ctr = result.impressions > 0 ? (result.clicks / result.impressions) * 100 : 0;
    result.purchaseRoas = result.spent > 0 ? (result.purchases * 50) / result.spent : 0;
    
    return result;
}

// 3. 修复calculateTotalRow函数（字段匹配表格列）
function calculateTotalRow(data) {
    const total = {
        budget: 0,
        spent: 0,
        clicks: 0,
        impressions: 0,
        cpm: 0,
        cpc: 0,
        ctr: 0,
        addsToCart: 0,
        checkoutsInitiated: 0,
        addsPaymentInfo: 0,
        purchases: 0,
        purchaseRoas: 0,
        cartCpa: 0,
        checkoutCpa: 0,
        paymentCpa: 0,
        purchaseCpa: 0
    };

    // 汇总所有明细行数据
    data.forEach(item => {
        total.budget += item.budget || 0;
        total.spent += item.spent || 0;
        total.clicks += item.clicks || 0;
        total.impressions += item.impressions || 0;
        total.addsToCart += item.addsToCart || 0;
        total.checkoutsInitiated += item.checkoutsInitiated || 0;
        total.addsPaymentInfo += item.addsPaymentInfo || 0;
        total.purchases += item.purchases || 0;
        total.purchaseRoas += item.purchaseRoas || 0;
    });

    // 计算总计行的衍生指标（修复除以0）
    total.cpm = total.impressions > 0 ? (total.spent / total.impressions) * 1000 : 0;
    total.cpc = total.clicks > 0 ? total.spent / total.clicks : 0;
    total.ctr = total.impressions > 0 ? (total.clicks / total.impressions) * 100 : 0;
    total.cartCpa = total.addsToCart > 0 ? total.spent / total.addsToCart : 0;
    total.checkoutCpa = total.checkoutsInitiated > 0 ? total.spent / total.checkoutsInitiated : 0;
    total.paymentCpa = total.addsPaymentInfo > 0 ? total.spent / total.addsPaymentInfo : 0;
    total.purchaseCpa = total.purchases > 0 ? total.spent / total.purchases : 0;

    return total;
}

   async function saveEdit() {

        }

}

// 全自动CSV导入函数（按Ad name匹配/创建广告）
async function handleDataImport(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            // ========== 终极修复：强制按列号绑定CPM ==========
            const HEADER_MAPPING = {
                'Reporting starts': 'date',
                'Ad name': 'ad_name',
                'Ad delivery': 'ad_delivery',
                '11': 'budget',
                '13': 'spent',
                '18': 'impressions',
                'Link clicks': 'clicks',
                '19': 'cpm',      // 强制第19列 = CPM
                '21': 'cpc',      // 强制第21列 = CPC
                '22': 'ctr',
                'Adds to cart': 'adds_to_cart',
                'Checkouts initiated': 'checkouts_initiated',
                'Adds of payment info': 'adds_payment_info',
                'Purchases': 'purchases',
                'Purchase_roas': 'purchase_roas'
            };

            let csvContent = e.target.result;
            if (csvContent.charCodeAt(0) === 0xFEFF) csvContent = csvContent.slice(1);
            const delimiter = ',';
            const lines = csvContent.replace(/\r/g, '').split('\n').filter(l => l.trim() !== '');
            
            if (lines.length < 2) { alert('CSV文件无有效数据！'); return; }
            const rawHeaders = lines[0].split(delimiter).map(h => h.trim());

            const colToDbField = {};
            for (const [key, dbField] of Object.entries(HEADER_MAPPING)) {
                let index;
                if (!isNaN(parseInt(key))) {
                    index = parseInt(key);
                } else {
                    index = rawHeaders.findIndex(h => h === key);
                }
                if (index >= 0 && index < rawHeaders.length) {
                    colToDbField[index] = dbField;
                }
            }

            console.log("最终匹配列：", colToDbField);

            function cleanNumber(value) {
                if (!value) return 0;
                const cleaned = String(value).replace(/[^0-9.-]/g, '');
                const num = parseFloat(cleaned);
                return isNaN(num) ? 0 : num;
            }

            const adDataMap = new Map();
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(delimiter).map(v => v.trim());
                if (values.length < rawHeaders.length) continue;

                let adName = '';
                const rowData = {};

                for (let col = 0; col < values.length; col++) {
                    const dbField = colToDbField[col];
                    if (!dbField) continue;
                    const rawValue = values[col];

                    switch (dbField) {
                        case 'date':
                            rowData.date = rawValue ? new Date(rawValue).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
                            break;
                        case 'ad_name':
                            adName = rawValue;
                            break;
                        case 'budget': case 'spent': case 'cpm': case 'cpc': case 'purchase_roas':
                            rowData[dbField] = cleanNumber(rawValue);
                            break;
                        case 'impressions': case 'clicks': case 'adds_to_cart': case 'checkouts_initiated': case 'adds_payment_info': case 'purchases':
                            rowData[dbField] = parseInt(cleanNumber(rawValue)) || 0;
                            break;
                        case 'ctr':
                            rowData.ctr = cleanNumber(rawValue);
                            break;
                        default:
                            rowData[dbField] = rawValue;
                    }
                }
                if (!adName || !rowData.date) continue;
                if (!adDataMap.has(adName)) adDataMap.set(adName, []);
                adDataMap.get(adName).push(rowData);
            }

            let totalImported = 0;
            const currentAccount = accounts.find(acc => acc.id === currentAccountId);
            if (!currentAccount) { alert('请先选择账号！'); return; }

            for (const [adName, adRows] of adDataMap.entries()) {
                let targetAd = ads.find(ad => ad.name === adName);
                let adId = targetAd ? targetAd.id : null;

                if (!adId) {
                    const campaignName = `CSV导入_${currentAccount.name}`;
                    let targetCampaign = campaigns.find(c => c.name === campaignName && c.accountId === currentAccountId);
                    if (!targetCampaign) {
                        targetCampaign = { id: 'camp_' + Date.now(), accountId: currentAccountId, name: campaignName, status: 'active', createdAt: new Date().toISOString() };
                        campaigns.push(targetCampaign);
                        await supabase.from('fb_ad_campaigns').upsert([mapToDB(targetCampaign)]);
                    }
                    const adSetName = `广告组_${adName.substring(0,20)}`;
                    let targetAdSet = adSets.find(as => as.name === adSetName && as.campaignId === targetCampaign.id);
                    if (!targetAdSet) {
                        targetAdSet = { id: 'adset_' + Date.now(), campaignId: targetCampaign.id, name: adSetName, status: 'active', createdAt: new Date().toISOString() };
                        adSets.push(targetAdSet);
                        await supabase.from('fb_ad_ad_sets').upsert([mapToDB(targetAdSet)]);
                    }
                    const newAd = { id: 'ad_' + Date.now(), adSetId: targetAdSet.id, name: adName, status: 'active', createdAt: new Date().toISOString() };
                    ads.push(newAd);
                    await supabase.from('fb_ad_ads').upsert([mapToDB(newAd)]);
                    adId = newAd.id;
                }

                const adDataItems = adRows.map((row, idx) => ({
                    id: `data_${adId}_${row.date}_${idx}`,
                    ad_id: adId,
                    date: row.date,

    const uniqueDates = [...new Set(adData.map(d => d.date))];

function updateWebsiteDataForDate(date) {
    // 汇总当天当前账号下所有广告数据
    const dayAdData = adData.filter(d => {
        // 统一取 adId / ad_id
        const adId = d.adId || d.ad_id;
        if (!adId) return false;

        // 找到广告
        const ad = ads.find(a => a.id === adId);
        if (!ad) return false;

        // 找到广告组
        const adSet = adSets.find(as => as.id === ad.adSetId);
        if (!adSet) return false;

        // 找到系列并校验账号
        const campaign = campaigns.find(c => c.id === adSet.campaignId);
        return campaign && campaign.accountId === currentAccountId && d.date === date;
    });

    const totalSpent = dayAdData.reduce((sum, d) => sum + (d.spent || 0), 0);
    const totalClicks = dayAdData.reduce((sum, d) => sum + (d.clicks || 0), 0);
    const totalAddsToCart = dayAdData.reduce((sum, d) => sum + (d.addsToCart || d.adds_to_cart || 0), 0);
    const totalCheckouts = dayAdData.reduce((sum, d) => sum + (d.checkoutsInitiated || d.checkouts_initiated || 0), 0);
    const totalPurchases = dayAdData.reduce((sum, d) => sum + (d.purchases || 0), 0);

    // 查找或创建当天网站数据
    let webData = websiteData.find(d => d.accountId === currentAccountId && d.date === date);
    if (!webData) {
        webData = {
            id: `web_${currentAccountId}_${date}`,
            accountId: currentAccountId,
            date: date,
            budget: Math.floor(totalSpent * 1.2),
            spent: totalSpent,
            clicks: totalClicks,
            jumpIP: Math.floor(totalClicks * 0.7),
            totalIP: Math.floor(totalClicks * 0.8),
            addsToCart: totalAddsToCart,
            checkouts: totalCheckouts,
            purchases: totalPurchases,
            success: Math.floor(totalPurchases * 0.9),
            sales: totalPurchases * 50
        };
        websiteData.push(webData);
    } else {
        webData.spent = totalSpent;
        webData.clicks = totalClicks;
        webData.addsToCart = totalAddsToCart;
        webData.checkouts = totalCheckouts;
        webData.purchases = totalPurchases;
    }
}function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toISOString().split('T')[0].replace(/-/g, '-');
}

// 格式化数字
function formatNumber(num, decimals = 2) {
    if (typeof num !== 'number' || isNaN(num)) return '0.00';
    
    // 向上取整到指定小数位
    const factor = Math.pow(10, decimals);
    const roundedNum = Math.ceil(num * factor) / factor;
    
    return roundedNum.toLocaleString('zh-CN', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
    });
}
